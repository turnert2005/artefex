name: Close Stale Issues and PRs

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            If this is still relevant, please comment or remove the stale label.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            Please rebase and update if you'd like to keep this open.
          close-issue-message: 'Closed due to inactivity. Feel free to reopen if this is still relevant.'
          close-pr-message: 'Closed due to inactivity. Feel free to reopen with updated changes.'
          days-before-stale: 90
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'priority: high,status: blocked'
          exempt-pr-labels: 'priority: high,status: blocked'
          operations-per-run: 30
